<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面 - Sandbox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #1e293b; font-size: 2.5rem; margin-bottom: 10px; }
        .success { color: #10b981; font-size: 4rem; margin-bottom: 20px; }
        .info { color: #64748b; margin-top: 20px; }
        .time { color: #667eea; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="success">✅</div>
        <h1>部署成功！</h1>
        <p class="info">Cloudflare Pages 测试页面</p>
        <p class="time">部署时间：2026-04-25 20:36</p>
    </div>
</body>
</html>
